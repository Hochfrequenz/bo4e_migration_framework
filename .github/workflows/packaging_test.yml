name: "Packaging Test"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run Packaging Test
        run: |
          uv build
          uv publish --dry-run dist/*
