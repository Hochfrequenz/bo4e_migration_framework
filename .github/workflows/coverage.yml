name: "Coverage"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run Tests and Record Coverage
        run: |
          uv run --group coverage coverage run -m pytest
          uv run --group coverage coverage html --omit .tox/*,unittests/*
          uv run --group coverage coverage report --fail-under 92 --omit .tox/*,unittests/*
